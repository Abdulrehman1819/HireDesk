spring.application.name=HireDesk

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:8443/hiredesk
spring.datasource.username=postgres
spring.datasource.password=abgreat123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=ThisIsMySuperSecretKeyForJWTSigningItMustBeLongEnough256Bits
jwt.expiration=3600000